# golangci-lint configuration
# See https://golangci-lint.run/docs/configuration/

version: "2"

run:
  timeout: 5m

linters:
  enable:
    - gocritic
    - gosec
    - misspell
    - modernize
    - unconvert
    - unparam

  settings:
    staticcheck:
      checks: ["all", "-QF1008"]

    govet:
      enable-all: true

    errcheck:
      check-type-assertions: false
      check-blank: true

    gosec:
      excludes:
        - G101
        - G104

    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - unnamedResult

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - gocritic

      - text: "shadow: declaration of \"err\""
        linters:
          - govet

      - linters:
          - staticcheck
        text: "QF1008:"

    paths:
      - "^vendor/"
      - "^bin/"
      - "^docs/"
      - ".*\\.pb\\.go$"
      - ".*_generated\\.go$"

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
